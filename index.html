<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Chest Gremlin</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link
		href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible+Mono:ital,wght@0,200..800;1,200..800&family=Roboto+Mono:ital,wght@0,100..700;1,100..700&family=Tiny5&display=swap"
		rel="stylesheet">
	<style>
		:root {
			--modal-color: black;
			--modal-bg-color: black;
			--text-basic: white;
			--text-labels: white;
			--text-values: white;
			--text-explanation: #ff0404;
		}

		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
		}

		body {
			background: black;
			background: url(ncdruid.webp) no-repeat center center fixed;
			background-size: cover;
			color: var(--text-basic);
			font-family: 'Times New Roman', Times, serif;
			font-family: 'Tiny5', monospace;
			font-family: 'Roboto Mono', monospace;
			font-family: 'Atkinson Hyperlegible Mono', monospace;
			font-size: 10px;
			height: 100vh;
			overflow: hidden;
			line-height: 1em;
			/* Adjusted line height for Tiny5 font */
		}

		.top-bar {
			position: fixed;
			top: 0;
			left: 0;
			right: 0;
			height: 40px;
			background: black;
			background: transparent;
			display: flex;
			justify-content: space-between;
			align-items: center;
		}

		.icon {
			font-size: 20px;
			color: #ffffff;
			cursor: pointer;
			background: none;
			border: none;
			font-family: inherit;
			transition: color 0.1s;
		}

		.icon:hover {
			color: var(--text-basic);
		}

		.stats-icon {
			margin-left: 10px;
		}

		.inventory-icon {
			margin-right: 10px;
		}

		.player-container {
			position: absolute;
			top: 50%;
			left: 50%;
			transform: translate(-50%, -50%);
			text-align: center;
		}

		.player {
			font-size: 60px;
			line-height: 1;
		}

		.modal {
			display: none;
			position: fixed;
			top: 0;
			left: 0;
			width: 100%;
			height: 100%;
			background: rgba(255, 255, 255, 0.08);
			background: transparent;
			z-index: 1000;
			ppadding: 30px;

			/* display: flex; */
			justify-content: center;
			align-items: flex-start;
		}

		.modal-content {
			display: flex;
			flex-direction: column;
			bborder: 2px outset var(--modal-color);
			border-radius: 2px;
			color: var(--text-basic);
			mmax-width: 400px;
			width: 100%;
			max-height: 80vh;
			overflow-y: auto;
		}

		.modal-header {
			display: flex;
			display: none;
			justify-content: space-between;
			background: var(--modal-color);
			bbackground: linear-gradient(to bottom, rgb(0 110 178), rgb(0 106 148));
			height: 20px;
			line-height: 20px;
		}

		.modal-header span {
			font-weight: bold;
		}

		.modal-body {
			background: var(--modal-bg-color);
			bbackground: linear-gradient(to right, rgb(102 102 102), rgb(108 108 108));
			ppadding: 20px;
			ttext-transform: uppercase;
		}

		.close-btn {
			pposition: absolute;
			ttop: 5px;
			rright: 10px;
			margin: 0px 6px;
			background: none;
			border: none;
			color: var(--text-basic);
			font-size: inherit;
			font-weight: bold;
			cursor: pointer;
			font-family: inherit;
		}

		.stat-line {
			display: flex;
			flex-direction: row;
			justify-content: flex-end;
			font-weight: bold;
			white-space: pre;
			mmargin: 1ex 0;
		}

		.stat-line:nth-child(odd) {
			bbackground-color: var(--odd-row);
			bbox-shadow: 2px 2px 2px var(--odd-row);
			bborder-radius: 2px;
		}

		.stat-line:nth-child(even) {
			ppadding: 2px;
		}

		.item-line {
			margin: 3px 0;
		}

		.label {
			color: var(--text-labels);
		}

		.label.colorless {
			color: var(--text-basic);
		}

		.label::after {
			content: ": ";
		}

		.value {
			color: var(--text-values);
		}

		.italic {
			font-style: italic;
		}

		.row {
			display: flex;
			flex-direction: row;
		}

		.column {
			flex: 1;
		}

		.rgb-gradient-text-flux {
			/* Define the RGB colors in a linear gradient */
			background: linear-gradient(to right, rgb(255 222 0), rgb(255 183 0), rgb(255 170 0));

			/* Use -webkit prefix for broad browser compatibility */
			-webkit-background-clip: text;
			background-clip: text;

			/* Make the original text transparent to reveal the gradient */
			color: transparent;

			/* Optional: Enhance visibility with larger/bolder font */
			ffont-size: 3rem;
			font-weight: bold;
		}

		.text-prestige {
			ccolor: #dfdfdf;
			ffont-weight: bold;
		}

		/* Action Log Bar */
		.action-log {
			position: fixed;
			bottom: 0;
			left: 0;
			right: 0;
			height: 60px;
			background: rgba(0, 0, 0, 0.8);
			border-top: 1px solid #333;
			display: flex;
			flex-direction: column;
			padding: 5px 10px;
			overflow: hidden;
			z-index: 100;
		}

		.log-header {
			font-size: 8px;
			color: #888;
			margin-bottom: 2px;
			text-transform: uppercase;
			display: none;
		}

		.log-content {
			flex: 1;
			overflow-y: auto;
			display: flex;
			flex-direction: column;
			justify-content: flex-end;
		}

		.log-entry {
			color: var(--text-basic);
			font-size: 10px;
			lline-height: 1.2;
			margin: 1px 0;
			opacity: 1;
			transition: opacity 0.3s ease;
		}

		.log-entry.recent {
			color: #ffff88;
		}

		.log-entry.old {
			opacity: 0.6;
		}

		.health-bar {
			display: inline-block;
			wwidth: 50%;
			/* border: 1px solid #333; */
		}

		.health-bar span {
			ccolor: gray;
		}

		.health-bar span:last-child {
			color: gray;
		}
	</style>
</head>

<body>
	<div class="top-bar">
		<button class="icon stats-icon" onclick="openStats()">📈</button>
		<button class="icon inventory-icon" onclick="openInventory()">🐫</button>
	</div>

	<div class="player-container">
		<div class="player">👺</div>
	</div>

	<!-- Stats Modal -->
	<div id="statsModal" class="modal">
		<div class="modal-content">
			<div class="modal-header">
				<span>wnd</span>
				<button class="close-btn" onclick="closeStats()">q</button>
			</div>
			<div class="modal-body">
				<div style="display: flex; flex-direction: rrow-reverse;">
					<div style="flex: 1;display: flex; flex-direction: column;">
						<div class="stat-line">
							<span class="health-bar"><span>▓▓▓</span><span>▓</span></span>
							<span class="label">hp</span>
							<span class="value">80</span>
						</div>
						<div class="stat-line">
							<span class="label">gold</span>
							<span class="value rgb-gradient-text-flux">102</span>
						</div>
						<div class="stat-line">
							<span class="label">rep</span>
							<span class="value">17</span>
						</div>

						<!--<i>Prestige</i><br />-->
						<div class="stat-line text-prestige">
							<span class="label">prestige</span>
							<span class="value">0</span>
						</div>
						<!--<div class="stat-line"><span class="label">Gold</span> <span class="value">0</span></div>-->
					</div>
					<div class="column"
						style="ffont-family: 'Roboto Mono'; ppadding: 0 6px; overflow-y: scroll; max-height: 200px; color: var(--text-explanation); flex: 2">
						Not literal gold — anything that glints, hums, or feels valuable.
					</div>
				</div>
			</div>
		</div>
	</div>

	<!-- Inventory Modal -->
	<div id="inventoryModal" class="modal">
		<div class="modal-content">
			<div class="modal-header">
				pack animal
				<button class="close-btn" onclick="closeInventory()">q</button>
			</div>
			<div class="modal-body">
				<div class="item-line"><span class="label">capacity</span> <span class="value">0/20</span></div>
				<div class="item-line">---</div>
				<div class="item-line"><span class="value">empty</span></div>
			</div>
		</div>
	</div>

	<!-- Action Log Bar -->
	<div class="action-log">
		<div class="log-header">Action Log</div>
		<div class="log-content" id="logContent">
			<div class="log-entry">Welcome, adventurer. Your journey begins...</div>
		</div>
	</div>

	<script>
		// Action Log System
		let logEntries = [];
		const MAX_LOG_ENTRIES = 50;

		function addLogEntry(message) {
			logEntries.push({
				message: message,
				timestamp: Date.now()
			});

			// Keep only the last MAX_LOG_ENTRIES
			if (logEntries.length > MAX_LOG_ENTRIES) {
				logEntries.shift();
			}

			updateLogDisplay();
		}

		function updateLogDisplay() {
			const logContent = document.getElementById('logContent');
			const currentTime = Date.now();

			logContent.innerHTML = logEntries.map((entry, index) => {
				const age = currentTime - entry.timestamp;
				let className = 'log-entry';

				if (age < 3000) { // Recent (less than 3 seconds)
					className += ' recent';
				} else if (age > 30000) { // Old (more than 30 seconds)
					className += ' old';
				}

				return `<div class="${className}">${entry.message}</div>`;
			}).join('');

			// Auto-scroll to bottom
			logContent.scrollTop = logContent.scrollHeight;
		}

		function openStats() {
			document.getElementById('statsModal').style.display = 'flex';
			addLogEntry('You review your current statistics.');
		}

		function closeStats() {
			document.getElementById('statsModal').style.display = 'none';
			addLogEntry('You close the statistics window.');
		}

		function openInventory() {
			document.getElementById('inventoryModal').style.display = 'flex';
			addLogEntry('You examine your pack animal\'s inventory.');
		}

		function closeInventory() {
			document.getElementById('inventoryModal').style.display = 'none';
			addLogEntry('You finish examining your belongings.');
		}
		// Close modals when clicking outside
		window.onclick = function (event) {
			const statsModal = document.getElementById('statsModal');
			const inventoryModal = document.getElementById('inventoryModal');

			if (event.target === statsModal) {
				closeStats();
			}
			if (event.target === inventoryModal) {
				closeInventory();
			}
		}

		// Close modals with Escape key
		document.addEventListener('keydown', function (event) {
			if (event.key === 'Escape') {
				const statsOpen = document.getElementById('statsModal').style.display === 'flex';
				const inventoryOpen = document.getElementById('inventoryModal').style.display === 'flex';

				closeStats();
				closeInventory();

				if (statsOpen || inventoryOpen) {
					addLogEntry('You press escape to close the window.');
				}
			}
		});

		// Initialize the log with some flavor text
		window.addEventListener('load', function () {
			setTimeout(() => addLogEntry('You feel the weight of adventure ahead.'), 2000);
			setTimeout(() => addLogEntry('The camp awaits your return with treasures.'), 4000);
		});
	</script>
</body>

</html>
